<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antiflown Inc</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    font-family: 'Georgia', serif;
    overflow: hidden;
  }

  .container {
    text-align: center;
  }

  h1 {
    font-size: clamp(2rem, 6vw, 5rem);
    font-weight: 400;
    letter-spacing: 0.15em;
    color: #ffffff;
    text-transform: uppercase;
  }

  h1 span {
    color: #c8a96e;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: #c8a96e;
    margin: 28px auto;
  }

  p {
    font-size: clamp(0.85rem, 2vw, 1.1rem);
    letter-spacing: 0.4em;
    color: #888;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Antiflown <span>Inc</span></h1>
    <div class="divider"></div>
    <p>Coming Soon</p>
  </div>
</body>
</html>
